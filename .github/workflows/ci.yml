name: CI CalculatorGFH

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Se configura JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          check-latest: true
          cache: gradle

      

      - name: Compilación
        run: ./gradlew compileJava --no-daemon

      - name: Pruebas unitarias
        run: ./gradlew test --no-daemon

      - name: Se sube el informe
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test